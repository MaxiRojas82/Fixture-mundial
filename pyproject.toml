[tool.flet]
org = "com.mrojas"
project = "maxfixture"
product = "MaxFixture - Mundial 2026"
description = "Seguí el Mundial FIFA 2026 en tiempo real: resultados en vivo, fixture, tabla de posiciones, análisis IA y alertas de goles."
version = "1.0.0"
build_number = 16
icon = "assets/icon.png"
exclude = ["objective_c"]

[tool.flet.splash]
image = "assets/icon.png"
color = "#1a1a2e"

[tool.flet.android]
permissions = ["INTERNET"]

# path_provider_foundation 2.6.0 trae objective_c 9.x, que requiere la
# función experimental native-assets de Dart y rompe `flet build`.
[tool.flet.flutter.pubspec.dependency_overrides]
path_provider_foundation = "2.4.1"

# Privacy policy URL (ingresar en Play Console al publicar):
# https://[TU_USUARIO].github.io/Fixture-mundial/privacy
