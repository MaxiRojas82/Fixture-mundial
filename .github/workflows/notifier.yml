name: MaxFixture — Notificador FCM

on:
  schedule:
    # Cada 5 minutos (mínimo permitido por GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # También se puede disparar manualmente

jobs:
  notify:
    name: Detectar eventos y enviar push
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: server/requirements.txt

      - name: Instalar dependencias
        run: pip install -r server/requirements.txt

      - name: Ejecutar notificador
        run: python server/notifier.py
        env:
          FOOTBALL_API_KEY:            ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_CREDENTIALS_JSON:   ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          WORLD_CUP_COMPETITION_ID:    '2000'
